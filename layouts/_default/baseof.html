<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}
  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      document.querySelector('.main-nav').classList.toggle('open');
      this.classList.toggle('open');
    });
  </script>
</body>
</html>
