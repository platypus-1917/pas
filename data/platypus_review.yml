current_issue: 183

editorial_statement: >
  Taking stock of the universe of positions and goals that constitutes leftist
  politics today, we are left with the disquieting suspicion that a deep
  commonality underlies the apparent variety: What exists today is built upon
  the desiccated remains of what was once possible.

submission_guidelines: >
  Articles range 750–4,500 words (longer pieces considered on a case-by-case
  basis). Send submissions to editor.platypusreview@gmail.com. All submissions
  must conform to the Chicago Manual of Style.

submission_email: "editor.platypusreview@gmail.com"

