current_issue: 37

editorial_statement: >
  Überblickt man das Universum der verschiedenen Positionen und Ziele, die
  linke Politik heute ausmachen, so wird man den beunruhigenden Verdacht nicht
  los, dass sich hinter der scheinbaren Vielfalt eine grundlegende
  Gemeinsamkeit verbirgt: Was heute existiert, wurde auf den Trümmern dessen
  errichtet, was einst möglich war.

editorial_statement_full: >
  Überblickt man das Universum der verschiedenen Positionen und Ziele, die
  linke Politik heute ausmachen, so wird man den beunruhigenden Verdacht nicht
  los, dass sich hinter der scheinbaren Vielfalt eine grundlegende
  Gemeinsamkeit verbirgt: Was heute existiert, wurde auf den Trümmern dessen
  errichtet, was einst möglich war.

  Zum Verständnis unserer Gegenwart erachten wir es für notwendig, die
  unüberschaubare Anhäufung von Positionen zu entwirren, um ihre Bedeutung
  für eine mögliche Rekonstitution emanzipatorischer Politik in der Gegenwart
  zu erkennen. Dafür ist es nötig zu überdenken, was eigentlich mit dem
  Begriff der Linken gemeint ist.

  Unsere Aufgabe beginnt dort, wo wir eine grundsätzliche Desillusionierung
  des gegenwärtigen Zustands progressiver Politik wahrnehmen. Wir denken,
  dass sich diese Ernüchterung nicht einfach durch puren Willen abschütteln
  lässt – durch ein einfaches „Weiter so!" Sie muss stattdessen explizit
  angesprochen werden und selbst als ein Objekt der Kritik zugänglich gemacht
  werden. Daher beginnen wir mit dem, was uns unmittelbar entgegentritt.

  Die Platypus Review wird von der Einsicht motiviert, dass die Linke
  orientierungslos ist. Wir möchte ein Forum für ein weites Spektrum an
  Strömungen und Ansätzen innerhalb der Linken bieten – nicht, weil wir
  Inklusion und Pluralität als Selbstzweck ansehen, sondern weil wir
  Uneinigkeit provozieren und gemeinsame Ziele als Orte der
  Auseinandersetzung eröffnen wollen. Auf diesem Weg könnten die aus den
  alten politischen Auseinandersetzungen resultierenden Anschuldigungen zum
  Zweck der Klärung des Objekts linker Kritik fruchtbar gemacht werden.

  Die Platypus Review setzt sich zum Ziel, eine Plattform zu schaffen und zu
  erhalten, die eine Erforschung und Klärung von Positionen und
  Orientierungen, die heute innerhalb der Linken vertreten werden, möglich
  macht; einen Ort, an dem Fragen aufgeworfen und Diskussionen verfolgt
  werden können, die ansonsten nicht stattfinden würden. Solange die Beiträge
  eine ehrliche Bereitschaft für dieses Projekt zeigen, werden sie in unserer
  Diskussion berücksichtigt.

submission_guidelines: >
  Artikel in der Platypus Review haben normalerweise eine Länge von
  5.000–40.000 Zeichen (mit Leerzeichen), längere Beiträge können auch
  berücksichtigt werden. Für entsprechende Anfragen und Beiträge bitte eine
  Email an die.platypus.review@gmail.com senden.

submission_email: "die.platypus.review@gmail.com"

