baseURL = 'https://platypus1917.org/'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

[taxonomies]
  category = 'categories'

[pagination]
  pagerSize = 20

[markup.goldmark.renderer]
  unsafe = true

# --- Permalinks (apply to all languages) ---
[permalinks]
  [permalinks.page]
    review = '/review/:slug/'
    events = '/events/:slug/'
    chapters = '/chapters/:slug/'
    about = '/about/:slug/'
    pages = '/:slug/'
    'reading-groups' = '/reading-groups/:slug/'

# --- Languages ---
[languages]
  [languages.en]
    languageCode = 'en-US'
    languageName = 'English'
    title = 'Platypus Affiliated Society'
    weight = 1
    contentDir = 'content'

  [languages.de]
    languageCode = 'de-DE'
    languageName = 'Deutsch'
    title = 'Platypus Affiliated Society'
    weight = 2
    contentDir = 'content/de'

  [languages.el]
    languageCode = 'el-GR'
    languageName = 'Ελληνικά'
    title = 'Platypus Affiliated Society'
    weight = 3
    contentDir = 'content/el'

  [languages.sq]
    languageCode = 'sq-AL'
    languageName = 'Shqip'
    title = 'Platypus Affiliated Society'
    weight = 4
    contentDir = 'content/sq'

  [languages.es]
    languageCode = 'es-ES'
    languageName = 'Español'
    title = 'Platypus Affiliated Society'
    weight = 5
    contentDir = 'content/es'

  [languages.pt]
    languageCode = 'pt-BR'
    languageName = 'Português'
    title = 'Platypus Affiliated Society'
    weight = 6
    contentDir = 'content/pt'

